name: 🦕 DinoMax Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build for macOS (Mac mini)
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build with Unity
        run: |
          UNITY="/Applications/Unity/Hub/Editor/$(ls /Applications/Unity/Hub/Editor | head -1)/Unity.app/Contents/MacOS/Unity"
          echo "Unity: $UNITY"
          "$UNITY" \
            -batchmode \
            -nographics \
            -quit \
            -projectPath "${{ github.workspace }}" \
            -buildTarget StandaloneOSX \
            -buildOSXUniversalPlayer "${{ github.workspace }}/Build/DinoMax.app" \
            -logFile "${{ github.workspace }}/Build/build.log" \
            || (cat "${{ github.workspace }}/Build/build.log" && exit 1)

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: DinoMax-macOS
          path: Build/DinoMax.app
          retention-days: 14

      - name: Upload Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: Build/build.log
          retention-days: 7
