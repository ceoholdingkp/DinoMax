name: 🦕 DinoMax Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build for macOS (Mac mini)
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Build directory
        run: mkdir -p "${{ github.workspace }}/Build"

      - name: Build with Unity
        run: |
          UNITY_PATH="/Applications/Unity/Hub/Editor/6000.3.11f1/Unity.app/Contents/MacOS/Unity"
          echo "Unity: $UNITY_PATH"
          "$UNITY_PATH" \
            -batchmode \
            -nographics \
            -quit \
            -projectPath "${{ github.workspace }}" \
            -executeMethod BuildScript.BuildMacOS \
            -buildOutput "${{ github.workspace }}/Build/DinoMax.app" \
            -logFile - \
            ; EXIT_CODE=$?
          echo "Unity exit code: $EXIT_CODE"
          exit $EXIT_CODE

      - name: Upload Build
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: DinoMax-macOS
          path: Build/DinoMax.app
          retention-days: 14
