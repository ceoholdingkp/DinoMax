name: 🦕 DinoMax Build

on:
  push:
    branches: [main]
  workflow_dispatch:   # permite lanzar manualmente desde GitHub

jobs:
  build:
    name: Build for Windows
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      # 2. Cache de la Library de Unity (acelera builds futuros)
      - name: Cache Unity Library
        uses: actions/cache@v3
        with:
          path: Library
          key: Library-DinoMax-Windows
          restore-keys: |
            Library-DinoMax-
            Library-

      # 3. Compilar con Unity (GameCI)
      - name: Build with Unity
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:   ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: StandaloneWindows64
          unityVersion: 2022.3.20f1
          buildName: DinoMax

      # 4. Subir el .exe como artefacto descargable
      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: DinoMax-Windows
          path: build/StandaloneWindows64
          retention-days: 14
